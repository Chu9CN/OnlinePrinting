<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlinePrinting - 设置新密码</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
<div id="page" class="site change-pwd-page">
    <div class="container">
        <div class="login">
            <div class="hero">
                <div class="hero-brand">
                    <span class="hero-icon" aria-hidden="true"><i class="ri-lock-password-line"></i></span>
                </div>
                <h1>首次登录，请设置新密码</h1>
                <p class="hero-desc">管理员已重置您的密码。为保障账户安全，请设置您自己的新密码。</p>
            </div>
            <div class="main">
                <form id="changePwdForm">
                    <p class="error-msg" id="errorMsg"></p>
                    <p class="password">
                        <input type="password" id="oldPassword" placeholder="临时密码 (000000)" required>
                        <i class="ri-eye-off-line toggle-pwd" data-target="oldPassword"></i>
                    </p>
                    <p class="password">
                        <input type="password" id="newPassword" placeholder="新密码" required>
                        <i class="ri-eye-off-line toggle-pwd" data-target="newPassword"></i>
                    </p>
                    <p class="password">
                        <input type="password" id="confirmPassword" placeholder="确认新密码" required>
                        <i class="ri-eye-off-line toggle-pwd" data-target="confirmPassword"></i>
                    </p>
                    <p>
                        <input type="submit" class="submit" value="修改密码并登录">
                    </p>
                </form>
                <div class="options"></div>
            </div>
        </div>
    </div>
</div>
<script>
const token = localStorage.getItem('token');
const user = localStorage.getItem('user');

未登录或不需要改密则跳转
if (!token || !user) {
    window.location.href = 'login.html';
} else {
    const userInfo = JSON.parse(user);
    if (!userInfo.force_password_change) {
        window.location.href = 'index.html';
    }
}

document.querySelectorAll('.toggle-pwd').forEach(icon => {
    icon.addEventListener('click', function() {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        this.classList.toggle('ri-eye-line');
        this.classList.toggle('ri-eye-off-line');
    });
});

document.getElementById('changePwdForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = '';

    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
        errorMsg.textContent = '两次输入的新密码不一致';
        return;
    }

    if (newPassword.length < 6) {
        errorMsg.textContent = '新密码至少需要6位';
        return;
    }

    try {
        const response = await fetch('/api/users/change-password', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
        });

        const data = await response.json();

        if (response.ok) {
            // 更新本地存储中的 force_password_change 状态
            const userInfo = JSON.parse(user);
            userInfo.force_password_change = false;
            localStorage.setItem('user', JSON.stringify(userInfo));
            window.location.href = 'index.html';
        } else {
            errorMsg.textContent = data.detail || '修改失败，请重试';
        }
    } catch (err) {
        errorMsg.textContent = '网络错误，请稍后重试';
    }
});
</script>
</body>
</html>
