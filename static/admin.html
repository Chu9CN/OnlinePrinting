<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlinePrinting - 管理后台</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="common.js"></script>
</head>
<body>
<div class="app-container admin-app">
    <!-- 顶部导航 -->
    <header class="app-header">
        <div class="header-left">
            <h2><i class="ri-settings-3-line"></i> 管理后台</h2>
        </div>
        <div class="header-right">
            <button class="header-btn" id="profileBtn" title="个人信息">
                <i class="ri-user-line"></i>
                <span id="adminName">-</span>
                <span class="badge">管理员</span>
            </button>
            <a href="index.html" class="header-btn">
                <i class="ri-file-line"></i> 文件管理
            </a>
            <button class="header-btn" onclick="logout()">
                <i class="ri-logout-box-line"></i> 退出
            </button>
        </div>
    </header>

    <!-- 标签页 -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('users')">
            <i class="ri-user-settings-line"></i> 用户管理
        </button>
        <button class="tab" onclick="switchTab('logs')">
            <i class="ri-file-list-3-line"></i> 操作日志
        </button>
    </div>

    <!-- 用户管理 -->
    <div id="tabUsers" class="tab-content active">
        <div class="table-container">
            <table class="file-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>邮箱</th>
                        <th>名称</th>
                        <th>管理员</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>
    </div>

    <!-- 操作日志 -->
    <div id="tabLogs" class="tab-content">
        <div class="toolbar">
            <div class="toolbar-left">
                <input type="text" id="logUsername" placeholder="按用户名筛选" class="input-text search-input">
                <button class="btn btn-secondary" onclick="loadLogs()">
                    <i class="ri-search-line"></i> 搜索
                </button>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-outline" onclick="loadLogs()">
                    <i class="ri-refresh-line"></i> 刷新
                </button>
            </div>
        </div>
        <div class="table-container">
            <table class="file-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户</th>
                        <th>操作</th>
                        <th>结果</th>
                        <th>详情</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="logList"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 自定义对话框 -->
<div class="dialog-overlay" id="customDialog" style="display:none">
    <div class="dialog-box">
        <i class="dialog-icon" id="dialogIcon"></i>
        <p class="dialog-message" id="dialogMessage"></p>
        <input type="text" class="dialog-input" id="dialogInput" style="display:none">
        <div class="dialog-actions">
            <button class="dialog-btn dialog-btn-secondary" id="dialogCancel">取消</button>
            <button class="dialog-btn dialog-btn-primary" id="dialogOk">确定</button>
        </div>
    </div>
</div>

<script>
let currentLogPage = 1;

document.addEventListener('DOMContentLoaded', () => {
    checkAdmin();
    loadUsers();
    loadLogs();
    document.getElementById('profileBtn').addEventListener('click', () => {
        window.location.href = 'profile.html';
    });
});

function checkAdmin() {
    const user = localStorage.getItem('user');
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    const userInfo = JSON.parse(user);
    if (userInfo.force_password_change) {
        window.location.href = 'change-password.html';
        return;
    }
    if (!userInfo.is_admin) {
        window.location.href = 'index.html';
        return;
    }
    document.getElementById('adminName').textContent = userInfo.display_name || userInfo.email.split('@')[0];
}

// ========== 标签页 ==========

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
}

// ========== 用户管理 ==========

async function loadUsers() {
    try {
        const res = await fetch(`${API_BASE}/users/list`, { headers: getHeaders() });
        const users = await res.json();
        renderUsers(users);
    } catch (err) {
        showToast('加载用户失败', 'error');
    }
}

function renderUsers(users) {
    const tbody = document.getElementById('userList');
    if (!Array.isArray(users) || users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9398b3">暂无用户</td></tr>';
        return;
    }
    tbody.innerHTML = users.map(u => {
        const email = u.email || '';
        const name = u.display_name || email.split('@')[0] || '-';
        return `
        <tr>
            <td>${u.id}</td>
            <td>${email}</td>
            <td>${name}</td>
            <td>${u.is_admin ? '<span class="badge">是</span>' : '否'}</td>
            <td>${u.is_disable ? '<span class="badge danger">禁用</span>' : '<span class="badge success">正常</span>'}</td>
            <td>${formatDate(u.create_time)}</td>
            <td>
                <button class="icon-btn" onclick="toggleAdmin(${u.id}, ${!u.is_admin})" title="${u.is_admin ? '取消管理' : '设为管理'}">
                    <i class="ri-admin-line"></i>
                </button>
                <button class="icon-btn" onclick="resetPassword(${u.id})" title="重置密码">
                    <i class="ri-key-line"></i>
                </button>
                ${u.id !== 1 ? `
                    <button class="icon-btn ${u.is_disable ? 'success' : 'danger'}" onclick="toggleDisable(${u.id}, ${!u.is_disable})" title="${u.is_disable ? '启用' : '禁用'}">
                        <i class="${u.is_disable ? 'ri-checkbox-circle-line' : 'ri-forbid-line'}"></i>
                    </button>
                    <button class="icon-btn danger" onclick="deleteUser(${u.id}, '${email.replace(/'/g, "\\'")}')" title="删除">
                        <i class="ri-delete-bin-line"></i>
                    </button>
                ` : ''}
            </td>
        </tr>
    `}).join('');
}

async function toggleAdmin(userId, isAdmin) {
    try {
        const res = await fetch(`${API_BASE}/admin/set-admin`, {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ user_id: userId, is_admin: isAdmin })
        });
        if (res.ok) {
            showToast(isAdmin ? '已设为管理员' : '已取消管理员', 'success');
            loadUsers();
        } else {
            const data = await res.json();
            showToast(data.detail || '操作失败', 'error');
        }
    } catch (err) {
        showToast('操作失败', 'error');
    }
}

async function resetPassword(userId) {
    if (!await confirm('确定要重置该用户的密码为 000000 吗?')) return;
    try {
        const res = await fetch(`${API_BASE}/users/reset-password/${userId}`, {
            method: 'POST',
            headers: getHeaders()
        });
        if (res.ok) {
            showToast('密码已重置为 000000', 'success');
        } else {
            const data = await res.json();
            showToast(data.detail || '操作失败', 'error');
        }
    } catch (err) {
        showToast('操作失败', 'error');
    }
}

async function toggleDisable(userId, isDisable) {
    try {
        const res = await fetch(`${API_BASE}/users/update/${userId}`, {
            method: 'PUT',
            headers: getHeaders(),
            body: JSON.stringify({ is_disable: isDisable })
        });
        if (res.ok) {
            showToast(isDisable ? '已禁用' : '已启用', 'success');
            loadUsers();
        } else {
            const data = await res.json();
            showToast(data.detail || '操作失败', 'error');
        }
    } catch (err) {
        showToast('操作失败', 'error');
    }
}

async function deleteUser(userId, username) {
    if (!await confirm(`确定要删除用户 "${username}" 吗? 该操作不可恢复!`)) return;
    try {
        const res = await fetch(`${API_BASE}/users/${userId}`, {
            method: 'DELETE',
            headers: getHeaders()
        });
        if (res.ok) {
            showToast('用户已删除', 'success');
            loadUsers();
        } else {
            const data = await res.json();
            showToast(data.detail || '删除失败', 'error');
        }
    } catch (err) {
        showToast('删除失败', 'error');
    }
}

// ========== 日志 ==========

async function loadLogs(page = 1) {
    currentLogPage = page;
    const username = document.getElementById('logUsername').value.trim();
    
    try {
        let url = `${API_BASE}/admin/logs?page=${page}&page_size=50`;
        if (username) url += `&username=${encodeURIComponent(username)}`;
        
        const res = await fetch(url, { headers: getHeaders() });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            showToast(data.detail || '加载日志失败', 'error');
            return;
        }
        const logs = await res.json();
        renderLogs(logs);
    } catch (err) {
        showToast('加载日志失败', 'error');
    }
}

function renderLogs(logs) {
    const tbody = document.getElementById('logList');
    if (!Array.isArray(logs) || logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9398b3">暂无日志</td></tr>';
        return;
    }
    tbody.innerHTML = logs.map(log => `
        <tr>
            <td>${log.id}</td>
            <td>${log.username || '-'}</td>
            <td>${log.action || '-'}</td>
            <td><span class="badge ${log.result === '成功' ? 'success' : 'danger'}">${log.result || '-'}</span></td>
            <td class="detail-cell">${log.detail || '-'}</td>
            <td>${formatDate(log.create_time)}</td>
        </tr>
    `).join('');
    
    // 简单分页
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = `
        <button class="btn btn-outline" ${currentLogPage <= 1 ? 'disabled' : ''} onclick="loadLogs(${currentLogPage - 1})">
            <i class="ri-arrow-left-s-line"></i> 上一页
        </button>
        <span class="page-info">第 ${currentLogPage} 页</span>
        <button class="btn btn-outline" onclick="loadLogs(${currentLogPage + 1})">
            下一页 <i class="ri-arrow-right-s-line"></i>
        </button>
    `;
}

</script>
</body>
</html>
